version: 2

sources:
  - name: bronze
    description: "Bronze tables from AI extraction and raw data ingestion - ALL IN BRONZE SCHEMA"
    database: open_navigator  # Single database with schemas
    schema: bronze  # Bronze schema for raw data
    tables:
      - name: bronze_contacts
        description: "People extracted from meeting transcripts via AI"
        columns:
          - name: id
            description: "Primary key"
          - name: source_event_id
            description: "Foreign key to bronze_events_localview"
          - name: source_ai_model
            description: "AI model used (e.g., gemini-1.5-flash)"
          - name: person_id
            description: "Wikidata QID or OpenStates person ID if matched"
          - name: full_name
            description: "Person's full name"
          - name: role
            description: "Role/title (e.g., Mayor, Council Member)"
          - name: org_id
            description: "Organization identifier"
          - name: wikidata_qid
            description: "Wikidata entity ID (if matched)"
          - name: extracted_at
            description: "Timestamp of extraction"
            
      - name: bronze_organizations_meetings
        description: "Organizations mentioned in meetings (deduplicated by org_id)"
        columns:
          - name: id
          - name: source_event_id
          - name: org_id
          - name: org_name
          - name: ein
          - name: ntee_code
          - name: extracted_at
          - name: last_seen_event_id
            description: "Most recent meeting where this org appeared"
          - name: first_seen_event_id
            description: "First meeting where this org appeared"
          
      - name: bronze_bills
        description: "Legislation discussed in meetings"
        columns:
          - name: id
          - name: source_event_id
          - name: leg_id
          - name: official_number
          - name: title
          - name: jurisdiction
          - name: year
          - name: extracted_at
          
      - name: bronze_decisions
        description: "Policy decisions from meeting analysis"
        columns:
          - name: id
          - name: source_event_id
          - name: decision_id
          - name: headline
          - name: decision_statement
          - name: outcome
          - name: extracted_at
          
      - name: bronze_topics
        description: "Topics extracted from meeting transcripts and agendas"
        columns:
          - name: id
          - name: topic_id
          - name: topic_name
          - name: category
          
      - name: bronze_causes
        description: "Policy causes and advocacy categories"
        columns:
          - name: id
          - name: cause_id
          - name: cause_name
          - name: description
          
      - name: bronze_events_localview
        description: "Meeting events with jurisdiction data (primarily from LocalView and YouTube)"
        columns:
          - name: id
          - name: event_id
            description: "Original event ID from events_search"
          - name: event_date
          - name: jurisdiction_name
          - name: jurisdiction_type
          - name: city
          - name: state_code
          - name: state
          - name: meeting_type
          - name: channel_id
            description: "YouTube channel ID (if event is from YouTube)"
          - name: loaded_at
      
      - name: bronze_events_channels
        description: "YouTube channels from government jurisdictions - validated and enriched"
        columns:
          - name: id
            description: "Primary key"
          - name: channel_id
            description: "YouTube channel ID (unique)"
          - name: channel_url
            description: "Full YouTube channel URL"
          - name: channel_title
            description: "Channel display name"
          - name: channel_type
            description: "Type: municipal, county, state, school, unknown"
          - name: subscriber_count
            description: "Number of subscribers"
          - name: video_count
            description: "Number of videos"
          - name: in_localview
            description: "TRUE if channel has videos in LocalView dataset"
          - name: in_jurisdictions_details
            description: "TRUE if found in jurisdictions_details_search"
          - name: on_public_website
            description: "TRUE if found on official government website"
          - name: in_wikidata
            description: "TRUE if verified via WikiData"
          - name: discovery_method
            description: "How channel was discovered (e.g., jurisdictions_details, wikidata)"
          - name: discovery_date
            description: "When channel was first discovered"
          - name: confidence_score
            description: "Confidence score from discovery method (0-1)"
          - name: jurisdictions
            description: "JSONB array of associated jurisdictions"
          - name: is_verified
            description: "TRUE if channel is verified by YouTube"
          - name: is_government
            description: "TRUE/FALSE/NULL - government channel classification"
          - name: flagged_as_junk
            description: "TRUE if flagged as non-government (news, entertainment, etc.)"
          - name: flag_reason
            description: "Reason for junk flag if applicable"
          - name: loaded_at
            description: "When record was first created"
          - name: last_updated
            description: "When record was last updated"
          
      - name: bronze_financial_items
        description: "Financial items from meeting discussions"
        columns:
          - name: id
          - name: source_event_id
          - name: financial_item_id
          - name: amount
          - name: item_description
          - name: extracted_at
          
      - name: bronze_organizations_nonprofits
        description: "Consolidated nonprofit organization data from multiple sources"
        columns:
          - name: ein
            description: "Employer Identification Number (primary key)"
          - name: irs_id
          - name: org_name
          - name: city
          - name: state_code
          - name: zip_code
          - name: ntee_cd
            description: "NTEE classification code"
          - name: irs_asset_amt
          - name: irs_income_amt
          - name: irs_revenue_amt
          
      - name: bronze_organizations_nonprofits_irs
        description: "IRS Business Master File (BMF) nonprofit data - 1.95M organizations"
        columns:
          - name: id
          - name: ein
            description: "Employer Identification Number (primary key)"
          - name: name
          - name: city
          - name: state_code
          - name: ntee_cd
            description: "NTEE classification code"
          - name: asset_amt
          - name: income_amt
          - name: revenue_amt
          
      - name: bronze_organizations_nonprofits_nccs
        description: "NCCS Core nonprofit data - 1.8M organizations with geographic enrichment"
        columns:
          - name: id
          - name: ein
            description: "Employer Identification Number (joins to IRS)"
          - name: ntee_nccs
            description: "NCCS NTEE classification"
          - name: nteev2
            description: "NTEE version 2"
          - name: latitude
          - name: longitude
          - name: census_cbsa_name
            description: "Census Core Based Statistical Area"
          - name: f990_total_revenue_recent
          - name: f990_total_assets_recent
      
      - name: bronze_organizations_nonprofits_nccs_history
        description: "Historical NCCS nonprofit data for time-series analysis"
        columns:
          - name: ein
          - name: year
          - name: total_revenue
          - name: total_assets
      
      - name: bronze_jurisdictions
        description: "Master list of jurisdictions (cities, counties, states)"
        columns:
          - name: jurisdiction_id
            description: "Primary key"
          - name: jurisdiction_name
          - name: jurisdiction_type
          - name: state_code
          - name: county_fips
          - name: website_url
      
      - name: bronze_jurisdictions_postal_codes
        description: "Census ZIP Code Tabulation Areas (ZCTAs) - 33,791 geographic areas"
        columns:
          - name: zcta
            description: "5-digit ZIP Code Tabulation Area code"
          - name: geoid
            description: "Geographic identifier (same as ZCTA)"
          - name: intptlat
            description: "Latitude of internal point"
          - name: intptlong
            description: "Longitude of internal point"
          - name: aland_sqmi
            description: "Land area in square miles"
          - name: awater_sqmi
            description: "Water area in square miles"
      
      - name: bronze_jurisdictions_zip_place
        description: "ZCTA to Place (city/town) relationships - Census 2020"
        columns:
          - name: zcta
            description: "5-digit ZIP Code Tabulation Area code"
          - name: place_geoid
            description: "7-digit Census Place GEOID"
          - name: place_name
            description: "Place name (city/town)"
          - name: state_fips
            description: "2-digit state FIPS code"
          - name: arealand_part
            description: "Land area of ZCTA part in this place (sq meters)"
          - name: areawater_part
            description: "Water area of ZCTA part in this place (sq meters)"
      
      - name: bronze_jurisdictions_zip_county
        description: "ZCTA to County relationships - Census 2020"
        columns:
          - name: zcta
            description: "5-digit ZIP Code Tabulation Area code"
          - name: county_geoid
            description: "5-digit County GEOID (FIPS code)"
          - name: county_name
            description: "County name"
          - name: state_fips
            description: "2-digit state FIPS code"
          - name: arealand_part
            description: "Land area of ZCTA part in this county (sq meters)"
          - name: areawater_part
            description: "Water area of ZCTA part in this county (sq meters)"
      
      - name: bronze_events_cdp
        description: "Meeting events from Council Data Project - CDP-compatible schema: https://councildataproject.org/"
        columns:
          - name: id
            description: "Primary key"
          - name: title
            description: "Event/meeting title"
          - name: description
            description: "Event description"
          - name: event_date
            description: "Date of event"
          - name: event_time
            description: "Time of event"
          - name: event_datetime
            description: "CDP field: combined date+time timestamp"
          - name: body_name
            description: "CDP field: meeting body name (e.g., 'City Council', 'Planning Commission')"
          - name: body_description
            description: "CDP field: meeting body description"
          - name: jurisdiction_id
            description: "Jurisdiction identifier"
          - name: jurisdiction_name
            description: "Jurisdiction name"
          - name: jurisdiction_type
            description: "Type of jurisdiction (city, county, etc.)"
          - name: state_code
            description: "Two-letter state code"
          - name: state
            description: "Full state name"
          - name: city
            description: "City name"
          - name: location
            description: "Meeting location"
          - name: location_description
            description: "Location description from YouTube (if available)"
          - name: meeting_type
            description: "Type of meeting"
          - name: status
            description: "Meeting status"
          - name: agenda_url
            description: "CDP: agenda_uri - Link to meeting agenda"
          - name: minutes_url
            description: "CDP: minutes_uri - Link to meeting minutes"
          - name: video_url
            description: "CDP: session.video_uri - Video URL (unique in production)"
          - name: session_content_hash
            description: "CDP field: hash for session deduplication"
          - name: channel_id
            description: "YouTube channel ID"
          - name: source
            description: "Data source: localview, youtube, legistar, etc."
          - name: datasource_id
            description: "Original ID from source system"
          - name: external_source_id
            description: "CDP field: external_source_id for cross-system tracking"
          - name: loaded_at
            description: "When record was loaded"
      
      - name: bronze_events_text_ai
        description: "Video transcripts and AI-extracted meeting text"
        columns:
          - name: id
            description: "Primary key"
          - name: event_id
            description: "Foreign key to events_search"
          - name: video_id
            description: "YouTube video ID (unique)"
          - name: raw_text
            description: "Full transcript as plain text"
          - name: segments
            description: "JSONB structured transcript with timestamps"
          - name: language
            description: "Transcript language (e.g., 'en', 'es')"
          - name: is_auto_generated
            description: "TRUE if auto-generated captions"
          - name: transcript_source
            description: "Source: youtube_api, whisper_ai, etc."
          - name: ai_model
            description: "AI model used for extraction"
          - name: has_transcript
            description: "TRUE if transcript available"
          - name: transcript_quality
            description: "Quality rating: high, medium, low"
          - name: created_at
            description: "When transcript was created"

models:
  - name: stg_bronze_contacts
    description: "Staged and cleaned bronze contacts with normalized names"
    columns:
      - name: bronze_contact_id
        description: "Original bronze table ID"
        tests:
          - unique
          - not_null
      - name: full_name
        description: "Original full name"
        tests:
          - not_null
      - name: full_name_normalized
        description: "Lowercase, trimmed name for matching"
        tests:
          - not_null
      - name: source_event_id
        description: "Link to source meeting/event"
      - name: wikidata_qid
        description: "Wikidata entity ID if available"
      - name: extracted_at
        description: "When this was extracted"
        tests:
          - not_null
  
  - name: stg_bronze_decisions
    description: "Staged and cleaned bronze decisions with recent decision flags"
    columns:
      - name: bronze_decision_id
        description: "Original bronze table ID"
        tests:
          - unique
          - not_null
      - name: source_event_id
        description: "Link to source meeting/event"
      - name: headline
        description: "Decision headline/summary"
      - name: decision_date
        description: "Date of decision"
        tests:
          - not_null
      - name: is_recent
        description: "True if decision is within last 90 days"
      - name: days_since_decision
        description: "Number of days since decision was made"
      - name: secondary_ntee_major_group
        description: "NTEE major cause category"
      - name: primary_theme
        description: "Primary policy theme"
      - name: extracted_at
        description: "When this was extracted"
        tests:
          - not_null
          
  - name: stg_bronze_organizations_meetings
    description: "Staged bronze organizations from meetings (deduplicated)"
    
  - name: stg_bronze_bills
    description: "Staged bronze bills"
  
  - name: stg_bronze_events_cdp
    description: |
      Staged and cleaned Council Data Project (CDP) events.
      Applies basic quality filters and normalization before deduplication in marts layer.
      
      Source: Council Data Project instances (Seattle, Portland, Boston, etc.)
    columns:
      - name: bronze_event_id
        description: "Original bronze table ID"
        tests:
          - unique
          - not_null
      - name: title
        description: "Event/meeting title (cleaned, trimmed)"
        tests:
          - not_null
      - name: event_date
        description: "Date of event"
        tests:
          - not_null
      - name: state_code
        description: "Two-letter state code (uppercase)"
      - name: video_url
        description: "Video URL (cleaned)"
      - name: channel_id
        description: "YouTube channel ID"
      - name: source
        description: "Data source: localview, youtube, legistar"
        tests:
          - not_null
      - name: missing_title
        description: "Quality flag - TRUE if title is null/empty"
      - name: missing_date
        description: "Quality flag - TRUE if event_date is null"
      - name: missing_state
        description: "Quality flag - TRUE if state_code is null/empty"
      - name: video_missing_channel
        description: "Quality flag - TRUE if has video_url but no channel_id"
  
  - name: stg_bronze_events_text_ai
    description: |
      Staged and cleaned video transcripts from AI extraction.
      Filters out very short or empty transcripts, calculates quality metrics.
      
      Sources: YouTube API, Whisper AI, Gemini AI
    columns:
      - name: bronze_transcript_id
        description: "Original bronze table ID"
        tests:
          - unique
          - not_null
      - name: video_id
        description: "YouTube video ID"
        tests:
          - not_null
      - name: raw_text
        description: "Full transcript as plain text (cleaned, trimmed)"
      - name: segments
        description: "JSONB structured transcript with timestamps"
      - name: transcript_source
        description: "Source: youtube_api, whisper_ai, gemini_ai, etc."
      - name: word_count
        description: "Approximate word count of transcript"
      - name: transcript_length
        description: "Character length of raw_text"
      - name: missing_transcript
        description: "Quality flag - TRUE if raw_text is null/empty"
      - name: very_short_transcript
        description: "Quality flag - TRUE if <100 characters"
      - name: missing_segments
        description: "Quality flag - TRUE if segments JSONB is null/empty"
