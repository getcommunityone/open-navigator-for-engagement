version: 2

models:
  - name: int_contacts_deduped
    description: "Deduplicated bronze contacts (one record per person per org)"
    columns:
      - name: bronze_contact_id
        description: "Original bronze table ID"
        tests:
          - unique
          - not_null
      - name: full_name_normalized
        description: "Normalized name for matching"
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - full_name_normalized
            - org_id
