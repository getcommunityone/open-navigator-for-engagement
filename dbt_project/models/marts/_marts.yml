version: 2

models:
  - name: organizations_nonprofits
    description: |
      Combined nonprofit organization data from IRS BMF + NCCS enrichment.
      
      This model:
      - Base: All 1.95M organizations from IRS Business Master File
      - Enrichment: Geographic coordinates, CBSA, detailed financials from NCCS (794k overlap)
      - Join strategy: LEFT JOIN on EIN (all IRS + NCCS where available)
      
      Use cases:
      - Geographic analysis: Use latitude/longitude for mapping
      - Financial analysis: Compare IRS amounts vs F990 recent values
      - Classification: Multiple NTEE versions (IRS, NCCS, NTEEv2)
      - Data quality: has_nccs_data and has_geocoding flags
      
      Data quality flags:
      - has_nccs_data: TRUE if organization found in NCCS dataset
      - has_geocoding: TRUE if latitude/longitude available
      
    config:
      tags: ['daily', 'nonprofits', 'enrichment']
      unique_key: 'ein'
      
    columns:
      - name: ein
        description: "Employer Identification Number (primary key)"
        tests:
          - unique
          - not_null
          
      - name: org_name
        description: "Organization name from IRS BMF"
        tests:
          - not_null
          
      - name: city
        description: "City from IRS BMF"
        
      - name: state_code
        description: "Two-letter state code from IRS BMF"
        tests:
          - not_null
        
      - name: ntee_cd
        description: "IRS NTEE classification code (primary)"
        
      - name: irs_asset_amt
        description: "Asset amount from IRS BMF"
        
      - name: irs_income_amt
        description: "Income amount from IRS BMF"
        
      - name: irs_revenue_amt
        description: "Revenue amount from IRS BMF"
        
      - name: latitude
        description: "Geographic latitude from NCCS (NULL if no NCCS data)"
        
      - name: longitude
        description: "Geographic longitude from NCCS (NULL if no NCCS data)"
        
      - name: census_cbsa_name
        description: "Census Core Based Statistical Area name from NCCS"
        
      - name: f990_total_revenue_recent
        description: "Most recent Form 990 total revenue from NCCS"
        
      - name: f990_total_assets_recent
        description: "Most recent Form 990 total assets from NCCS"
        
      - name: has_nccs_data
        description: "TRUE if organization has NCCS enrichment data"
        tests:
          - not_null
          
      - name: has_geocoding
        description: "TRUE if latitude/longitude coordinates available"
        tests:
          - not_null
          
      - name: last_updated
        description: "Most recent load timestamp from either IRS or NCCS"
        tests:
          - not_null
  
  - name: stats_aggregates
    description: |
      Jurisdiction-level statistics with trending causes.
      
      This model:
      - Aggregates counts of jurisdictions, nonprofits, events, contacts, bills
      - Includes trending causes (JSON) based on decisions in last 90 days
      - Provides stats at multiple levels: national, state, county, city, jurisdiction
      
      Trending causes are calculated from bronze_decisions and ranked by:
      - Decision count (number of decisions related to cause)
      - Recency (most recent decisions weighted higher)
      
    config:
      tags: ['daily', 'stats', 'aggregates']
      unique_key: ['level', 'state_code', 'county', 'city']
      
    columns:
      - name: level
        description: "Aggregation level (national, state, county, city, jurisdiction)"
        tests:
          - not_null
          - accepted_values:
              values: ['national', 'state', 'county', 'city', 'jurisdiction']
              
      - name: state_code
        description: "Two-letter state code (NULL for national)"
      
      - name: state
        description: "Full state name (NULL for national)"
        
      - name: county
        description: "County name (NULL for non-county levels)"
        
      - name: city
        description: "City/jurisdiction name (NULL for higher levels)"
        
      - name: jurisdictions_count
        description: "Number of tracked jurisdictions"
        
      - name: nonprofits_count
        description: "Number of nonprofit organizations"
        
      - name: events_count
        description: "Number of meetings/events"
        
      - name: contacts_count
        description: "Number of contacts/officials"
        
      - name: bills_count
        description: "Number of bills/legislation tracked"
        
      - name: trending_causes
        description: |
          JSON array of trending causes based on decisions in last 90 days.
          Each cause includes: category, code, decision_count, topics, most_recent, rank, sample_headlines
        
      - name: last_updated
        description: "Timestamp of last stats update"
        tests:
          - not_null
  
  - name: contacts_search_ai
    description: |
      AI-extracted contacts from meeting transcripts.
      
      This model:
      - Pulls from deduplicated bronze_contacts
      - Avoids overriding authoritative sources (OpenStates, IRS)
      - Assigns confidence_score of 0.60 for AI extractions
      - Runs incrementally (only new records since last run)
      
      Data sources merged elsewhere:
      - OpenStates legislators: loaded via Python script
      - IRS 990 nonprofit officers: loaded via Python script
      
    config:
      tags: ['daily', 'ai_extraction']
      
    columns:
      - name: id
        description: "Surrogate key (hash of name + org + datasource)"
        tests:
          - unique
          - not_null
          
      - name: name
        description: "Contact full name"
        tests:
          - not_null
          - dbt_expectations.expect_column_value_lengths_to_be_between:
              min_value: 3
              max_value: 255
          
      - name: datasource
        description: "Always 'gemini_ai_extraction' for this model"
        tests:
          - accepted_values:
              values: ['gemini_ai_extraction']
          
      - name: confidence_score
        description: "Data quality score (0.60 for AI extraction)"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0.0
              max_value: 1.0
              
      - name: role_type
        description: "Contact role classification"
        tests:
          - accepted_values:
              values: 
                - 'lobbyist'
                - 'government_official'
                - 'other'
                - 'nonprofit_officer'
                - 'state_legislator'
              
      - name: last_updated
        description: "When this record was created/updated"
        tests:
          - not_null
  
  - name: jurisdictions
    description: >
      Final API-ready jurisdictions table. Single source of truth for all jurisdiction data.
      Quality-filtered, enriched, and optimized for API consumption.
      
      Used by: api/routes/search_postgres.py, frontend search, data exports
    columns:
      - name: jurisdiction_id
        description: Primary identifier for jurisdiction
        tests:
          - unique
          - not_null
      - name: geoid
        description: Cleaned Census GEOID (standard geographic identifier)
        tests:
          - not_null
      - name: fips_code
        description: Cleaned FIPS code
      - name: display_name
        description: Cleaned name for display in UI
        tests:
          - not_null
      - name: jurisdiction_type
        description: Type of jurisdiction (city, county, state, etc.)
        tests:
          - not_null
      - name: state_code
        description: 2-letter state abbreviation
        tests:
          - not_null
  
  - name: organizations_nonprofit_search
    description: >
      API-ready nonprofit organizations search table with NTEE enrichment and quality filtering.
      
      Used by: api/routes/search_postgres.py, frontend nonprofit search
    columns:
      - name: ein
        description: Employer Identification Number (primary key)
        tests:
          - unique
          - not_null
      - name: name
        description: Organization name
        tests:
          - not_null
      - name: city
        description: Organization city
      - name: state_code
        description: 2-letter state code
        tests:
          - not_null
      - name: ntee_code
        description: NTEE classification code
      - name: ntee_description
        description: Human-readable NTEE category description
  
  - name: events_channels_search
    description: |
      Production table for YouTube channel search API.
      Quality-filtered channels with event statistics, activity status, and validation scores.
      
      Used by: api/routes/search_postgres.py, frontend channel search
    columns:
      - name: channel_id
        description: YouTube channel ID (primary key)
        tests:
          - unique
          - not_null
      - name: channel_title
        description: Channel display name
        tests:
          - not_null
      - name: quality_score
        description: Quality score 0-1 based on validation sources
        tests:
          - not_null
      - name: is_likely_government
        description: Boolean flag for government channels
      - name: activity_status
        description: "Channel activity: active, recent, stale, inactive, no_videos"
        tests:
          - not_null
          - accepted_values:
              values: ['active', 'recent', 'stale', 'inactive', 'no_videos']
      - name: event_count
        description: Number of associated events/videos
  
  - name: events_search
    description: |
      Production API-ready meeting events table.
      
      This model:
      - Deduplicates events by video_url (keeps most recent)
      - Combines data from LocalView, YouTube, Legistar, and other sources
      - Applies quality filters (must have title and date)
      - Single source of truth for all meeting events
      
      Used by: api/routes/search_postgres.py, frontend event search
      
      Data Flow: bronze_events_cdp → stg_bronze_events_cdp → events_search
    config:
      tags: ['marts', 'events', 'production']
      unique_key: 'id'
    columns:
      - name: id
        description: "Primary key (auto-generated sequence)"
        tests:
          - unique
          - not_null
      - name: title
        description: "Event/meeting title"
        tests:
          - not_null
      - name: event_date
        description: "Date of event"
        tests:
          - not_null
      - name: jurisdiction_name
        description: "Jurisdiction name (city, county, etc.)"
      - name: state_code
        description: "Two-letter state code"
      - name: state
        description: "Full state name"
      - name: video_url
        description: "Video URL (unique - deduplicated)"
      - name: channel_id
        description: "YouTube channel ID"
      - name: source
        description: "Data source: localview, youtube, legistar, etc."
        tests:
          - not_null
      - name: view_count
        description: "YouTube video views (for YouTube sources)"
      - name: duration_minutes
        description: "Video duration in minutes"
      - name: last_updated
        description: "When record was last updated"
        tests:
          - not_null
  
  - name: events_text_search
    description: |
      Production table for video transcript full-text search.
      
      This model:
      - Joins transcripts to events_search to get event_id
      - Deduplicates by video_id (keeps highest quality transcript)
      - Filters for useful transcripts (>100 characters)
      - Quality scoring: prefers manual over auto-generated, longer over shorter
      
      Used by: api/routes/search_postgres.py for transcript search
      
      Data Flow: bronze_events_text_ai → stg_bronze_events_text_ai → events_text_search
    config:
      tags: ['marts', 'events', 'transcripts', 'production']
      unique_key: 'id'
    columns:
      - name: id
        description: "Primary key (auto-generated sequence)"
        tests:
          - unique
          - not_null
      - name: event_id
        description: "Foreign key to events_search.id"
      - name: video_id
        description: "YouTube video ID (unique - deduplicated)"
        tests:
          - not_null
      - name: raw_text
        description: "Full transcript as plain text"
      - name: segments
        description: "JSONB structured transcript with timestamps"
      - name: language
        description: "Transcript language (e.g., 'en', 'es')"
      - name: is_auto_generated
        description: "TRUE if auto-generated captions"
      - name: transcript_source
        description: "Source: youtube_api, whisper_ai, gemini_ai, etc."
      - name: created_at
        description: "When transcript was created"
        tests:
          - not_null
