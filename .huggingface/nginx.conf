user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 768;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    gzip on;

    server {
        listen 7860;
        server_name _;
        client_max_body_size 100M;
        
        # Fix redirects for custom domain (prevent port in redirect URLs)
        absolute_redirect off;
        port_in_redirect off;

        # API Backend
        location /api/ {
            proxy_pass http://localhost:8000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
        }

        # Documentation (Docusaurus) - Handle client-side routing
        location /docs/ {
            alias /app/static/docs/;
            try_files $uri $uri/ $uri.html index.html;
            add_header Cache-Control "public, max-age=3600";
        }
        
        # Redirect /docs to /docs/ (nginx will use relative redirect)
        location = /docs {
            return 301 /docs/;
        }
        
        # Documentation static assets (images, css, js)
        location /docs/img/ {
            alias /app/static/docs/img/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        location /docs/assets/ {
            alias /app/static/docs/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Main React App (default)
        location / {
            root /app/static/frontend;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "public, max-age=3600";
        }

        # Static assets for frontend
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            root /app/static/frontend;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
