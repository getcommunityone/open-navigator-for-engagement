<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Circular background with gradient -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main circle -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGradient)" />
  
  <!-- Inner white circle for contrast -->
  <circle cx="100" cy="100" r="85" fill="white" />
  
  <!-- C1 text - bold and modern -->
  <text x="100" y="125" font-family="Arial, sans-serif" font-size="80" font-weight="bold" 
        text-anchor="middle" fill="url(#logoGradient)">C1</text>
  
  <!-- Subtle border -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#logoGradient)" stroke-width="3" />
</svg>
